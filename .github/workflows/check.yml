name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  vectors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      # The core guarantee: the corpus reproduces its verdicts and its digest,
      # with the standard library only. No network, no dependencies.
      - name: Run the checker
        run: python3 check.py

      # DX/AX extra: every native record validates against the published JSON
      # Schema, and the one digest-without-scheme-id case is rejected by it,
      # so the schema and the vectors cannot drift apart. jsonschema is a CI-only
      # dependency; the repo core stays dependency-free.
      - name: Install schema validator (CI only)
        run: pip install "jsonschema>=4.22,<5"
      - name: Vectors conform to the schema
        run: python3 schema/validate_vectors.py
